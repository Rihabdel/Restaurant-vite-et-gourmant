<div class="container mt-5 mb-5 contact-form">
    <h1 class="text-center">Contactez-nous</h1>
    <p class="text-center">N'hésitez pas à nous envoyer un message en remplissant le formulaire ci-dessous.</p>
    <small class="text-center">Nous vous répondrons dans les plus brefs délais.</small>
    
    <form id="contactForm" class="mt-4">
      
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Votre email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="subject" class="form-label">Sujet</label>
            <input type="text" class="form-control" id="subject" placeholder="Sujet de votre message" name="subject" required>
        </div>
        <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="5" placeholder="Votre message" name="message" required></textarea>
        </div>
        <div class="text-center">
        <button type="submit" class="btn btn-primary" id="submitBtn">Envoyer</button>
        </div>
    </form>
</div>
<script type="module" src="../js/contact.js"></script>
