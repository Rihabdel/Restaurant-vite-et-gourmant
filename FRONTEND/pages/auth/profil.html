<section class="info-section mt-5">
  <div class="container" id="profileInfo">
      <!-- Les informations de l'utilisateur seront affichées ici -->
  </div>
  <div class="text-center">
    <button class="btn btn-primary" id="editProfileBtn" aria-expanded="false" aria-controls="editProfileForm">
      Modifier les informations
    </button>
  </div>
</div>
<div class="collapse mt-4" id="editProfileForm">
    <form id="profileForm">
        <div class="row row-cols-2">

        <div class="col-4 mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Votre nom" name="Nom"> 
        </div>
        <div class="col-4 mb-3">
            <label for="PrenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="PrenomInput" placeholder="Votre prénom" name="Prenom"> 
        </div>
        <div class="col-4 mb-3">
          <label for="gsmInput" class="form-label">Numéro Téléphone</label>
          <input type="text" class="form-control" id="gsmInput" placeholder="Votre numéro de téléphone" name="NumeroTelephone"> 
        </div>
        </div>
        <div class="col-8 mb-3">
          <label for="AdressePostaleInput" class="form-label">Adresse postale</label>
          <input type="text" class="form-control" id="AdressePostaleInput" placeholder="Votre adresse postale" name="AdressePostale"> 
        </div>
        <div class="text-center">
            <button type="submit" id="updateProfileButton" class="btn btn-primary">Mettre à jour les informations</button>
        </div>
    </form>
</div>
</section>  
<section class="settings-section mt-5 mb-5">
  <div class="container text-center">
    <h2 class="text-center mb-4">Paramètres du Compte</h2>
    <button class="btn btn-secondary" id="editPasswordBtn">Changer le mot de passe</button>
    <button class="btn btn-outline-secondary ms-3" id="signoutBtn">Se déconnecter</button>
    <button class="btn btn-danger ms-3" id="deleteAccountBtn">Supprimer le compte</button>
  </div>
</section>
<!-- modal changement de mot de passe -->
<div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="changePasswordModalLabel">Changer le mot de passe</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="PasswordUpdateForm">
          <div class="mb-3">
            <label for="currentPassword" class="form-label">Mot de passe actuel</label>
            <input type="password" class="form-control" id="currentPassword" required name="currentPassword">
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">Nouveau mot de passe</label>
            <input type="password" class="form-control" id="newPassword" required name="newPassword">
          </div>
          <div class="mb-3">
            <label for="confirmNewPassword" class="form-label">Confirmer le nouveau mot de passe</label>
            <input type="password" class="form-control" id="confirmNewPassword" required name="confirmNewPassword">
          </div>
          <button type="submit" id="updatePasswordButton" class="btn btn-primary">Mettre à jour le mot de passe</button>
        </form>
      </div>
    </div>
  </div>
</div>
 <!--delete account modal -->
  <div class="modal fade" id="deleteAccountModal" tabindex="-1" aria-labelledby="deleteAccountModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="deleteAccountModalLabel">Supprimer le compte</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Êtes-vous sûr de vouloir supprimer votre compte ? Cette action est irréversible.</p>
          <button type="button"  class="btn btn-danger" id="confirmDeleteAccount">Supprimer le compte</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        </div>
      </div>
    </div>
  </div>
